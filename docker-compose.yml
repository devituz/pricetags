services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricetags}
      POSTGRES_USER: ${POSTGRES_USER:-pricetags}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricetags}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pricetags_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - pricetags_esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pricetags}:${POSTGRES_PASSWORD:-pricetags}@postgres:5432/${POSTGRES_DB:-pricetags}?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MIGRATE_ON_START: ${MIGRATE_ON_START:-true}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  pricetags_pgdata:
  pricetags_esdata:
