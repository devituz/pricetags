services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: pricetags
      POSTGRES_USER: pricetags
      POSTGRES_PASSWORD: pricetags
    ports:
      - "5432:5432"
    volumes:
      - pricetags_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricetags -d pricetags"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - pricetags_esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pricetags:pricetags@postgres:5432/pricetags?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  pricetags_pgdata:
  pricetags_esdata:
